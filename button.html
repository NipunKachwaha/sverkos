<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen gap-8">

    <div class="flex flex-col items-center gap-2">
        <span class="text-xs text-gray-500 font-sans">Normal (Hover Me)</span>
        <button class="flex items-center text-gray-700 bg-transparent hover:text-blue-600 rounded-md p-1 hover:bg-gray-200 transition-colors">
            <svg class="w-6 h-6 text-xl" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </button>
    </div>

    <div class="flex flex-col items-center gap-2">
        <span class="text-xs text-gray-500 font-sans">Disabled</span>
        <button disabled class="flex items-center text-gray-700 bg-transparent rounded-md p-1 opacity-30 cursor-not-allowed">
            <svg class="w-6 h-6 text-xl" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </button>
    </div>

</body>
</html>
